<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog API Explorer</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>Dog API Explorer</h1>
<p>Using JavaScript Fetch API</p>
</header>

<main>

<section class="card">
<h2>Dog Breeds</h2>
<ul id="breedList"></ul>
</section>

<section class="card">
<h2>Breed Details</h2>
<div id="breedDetails">Select a breed to view details.</div>
</section>

<section class="card">
<h2>Dog Facts</h2>
<button id="factsBtn">Load Facts</button>
<ul id="factsList"></ul>
</section>

<section class="card">
<h2>Dog Groups</h2>
<button id="groupsBtn">Load Groups</button>
<ul id="groupList"></ul>
</section>

</main>

<script src="js/script.js"></script>

</body>
</html>
